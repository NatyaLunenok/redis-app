apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: notification-service:local
        imagePullPolicy: Never
        env:
        - name: REDIS_HOST
          value: redis
        # Liveness Probe
        livenessProbe:
          exec:
            command:
              - python
              - -c
              - "import redis, os; r = redis.Redis(host=os.environ.get('REDIS_HOST', 'localhost')); r.ping()"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        # Readiness Probe
        readinessProbe:
          exec:
            command:
              - python
              - -c
              - "import redis, os; r = redis.Redis(host=os.environ.get('REDIS_HOST', 'localhost')); r.ping()"
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1